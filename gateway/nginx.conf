upstream customer_service {
    server customer_service:8000;
}

upstream staff_service {
    server staff_service:8000;
}

upstream laptop_service {
    server laptop_service:8000;
}

upstream clothes_service {
    server clothes_service:8000;
}

upstream cart_service {
    server cart_service:8000;
}

upstream order_service {
    server order_service:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Block all internal endpoints from outside
    location ~* /internal/ {
        return 403;
    }

    # ── Customer Service ──
    location /api/customers/ {
        proxy_pass http://customer_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Staff Service ──
    location /api/staff/ {
        proxy_pass http://staff_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Laptop Service ──
    location /api/laptops/ {
        proxy_pass http://laptop_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Clothes Service ──
    location /api/clothes/ {
        proxy_pass http://clothes_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Cart Service ──
    location /api/cart/ {
        proxy_pass http://cart_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Order Service ──
    location /api/orders/ {
        proxy_pass http://order_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        access_log off;
        return 200 '{"status": "ok"}';
        add_header Content-Type application/json;
    }

    location / {
        return 404 '{"detail": "Not found. Available: /api/customers/, /api/staff/, /api/laptops/, /api/clothes/, /api/cart/, /api/orders/"}';
        add_header Content-Type application/json;
    }
}

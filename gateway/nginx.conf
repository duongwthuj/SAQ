upstream user_service {
    server user_service:8000;
}

upstream product_service {
    server product_service:8000;
}

upstream order_service {
    server order_service:8000;
}

upstream inventory_service {
    server inventory_service:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Block all internal endpoints from outside
    location ~* /internal/ {
        return 403;
    }

    # ── User Service ──
    location /api/users/ {
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Product Service ──
    location /api/products/ {
        proxy_pass http://product_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/categories/ {
        proxy_pass http://product_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Order Service ──
    location /api/orders/ {
        proxy_pass http://order_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Inventory Service ──
    location /api/inventory/ {
        proxy_pass http://inventory_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        access_log off;
        return 200 '{"status": "ok"}';
        add_header Content-Type application/json;
    }

    location / {
        return 404 '{"detail": "Not found. Available: /api/users/, /api/products/, /api/categories/, /api/orders/, /api/inventory/"}';
        add_header Content-Type application/json;
    }
}

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_service_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: change-me-in-production
      DEBUG: "True"
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: user_service_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate && gunicorn user_service.wsgi:application --bind 0.0.0.0:8000 --workers 3"

volumes:
  mysql_data:
